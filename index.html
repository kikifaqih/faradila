<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioPulse Pro - Stress Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #ffffff;
        }

        .bento-card {
            background: #1c1c1e;
            border-radius: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hidden-tab { display: none !important; }

        .nav-active { color: #38bdf8 !important; transform: scale(1.1); }
        
        /* Animasi Dot Toggle */
        #btnOled div {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="pb-32">

    <header class="p-8 pb-4">
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1" id="header-subtitle">Health Monitor</p>
        <h1 class="text-3xl font-extrabold tracking-tight">BioPulse <span class="gradient-text" id="tab-title">Bento</span></h1>
    </header>

    <main id="content-dashboard" class="px-6 grid grid-cols-6 gap-4">
        <div class="col-span-3 bento-card p-6 flex flex-col justify-between aspect-square">
            <div class="w-10 h-10 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg>
            </div>
            <div>
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Temp</p>
                <h2 id="tempMobile" class="text-3xl font-bold italic">--°</h2>
            </div>
        </div>

        <div id="statusBento" class="col-span-3 bento-card p-6 flex flex-col justify-between aspect-square">
            <div id="statusIconBg" class="w-10 h-10 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M18 10V4"></path><path d="M6 20v-6"></path></svg>
            </div>
            <div>
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Stress</p>
                <h2 id="stressMobile" class="text-xl font-black uppercase leading-tight">Wait..</h2>
            </div>
        </div>

        <div class="col-span-6 bento-card p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xs uppercase tracking-widest text-slate-400">Live Analytics</h3>
                <span id="gsrRawText" class="text-[10px] bg-white/5 px-3 py-1 rounded-full font-mono text-sky-400">GSR: --</span>
            </div>
            <canvas id="mobileChart" height="150"></canvas>
        </div>

        <div id="insightCard" class="col-span-6 bento-card p-5 flex items-center gap-5 border-l-8 border-sky-500">
            <div class="text-3xl" id="insightEmoji">👋</div>
            <div class="flex-1">
                <h4 id="insightTitle" class="text-sm font-bold mb-0.5 text-white">Halo!</h4>
                <p id="insightDesc" class="text-[11px] text-slate-400 leading-tight">Tempelkan jari untuk mulai.</p>
            </div>
        </div>
    </main>

    <main id="content-history" class="px-6 space-y-4 hidden-tab">
        <div class="bento-card p-6">
            <h3 class="font-bold text-xs uppercase tracking-widest text-slate-400 mb-4">Recent Events</h3>
            <div id="logContainer" class="space-y-3 max-h-80 overflow-y-auto no-scrollbar">
                <p class="text-xs text-slate-600 text-center py-4">Belum ada aktivitas tercatat...</p>
            </div>
        </div>
        <button onclick="exportToCSV()" class="w-full bento-card p-5 text-sky-400 font-bold flex justify-center items-center gap-3 active:scale-95">
            Download Data (.CSV)
        </button>
    </main>

    <main id="content-device" class="px-6 space-y-4 hidden-tab">
        <div class="bento-card p-6 border-l-4 border-purple-500">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xs uppercase tracking-widest text-slate-400">Hardware Status</h3>
                <span id="wifi-badge" class="px-3 py-1 bg-slate-500/10 text-slate-400 text-[10px] font-bold rounded-full">CHECKING...</span>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <div>
                        <p class="text-sm font-bold text-white">OLED Display</p>
                        <p class="text-[10px] text-slate-500">Layar pada alat fisik</p>
                    </div>
                    <button id="btnOled" onclick="toggleOled()" class="w-12 h-6 bg-sky-500 rounded-full relative transition-all">
                        <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                    </button>
                </div>
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <div>
                        <p class="text-sm font-bold text-white">Auto Calibration</p>
                        <p class="text-[10px] text-slate-500">Sinkronisasi ulang sensor</p>
                    </div>
                    <button onclick="startCalibration()" id="btnCalibrate" class="px-4 py-2 bg-white/10 text-[10px] font-bold rounded-xl active:bg-sky-500 transition-all">START</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] h-16 bg-[#2c2c2e]/90 backdrop-blur-xl rounded-[2rem] flex items-center justify-around shadow-2xl border border-white/5 z-50">
        <button id="nav-dashboard" onclick="switchTab('dashboard')" class="p-3 nav-active transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </button>
        <button id="nav-history" onclick="switchTab('history')" class="p-3 text-slate-500 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        </button>
        <button id="nav-device" onclick="switchTab('device')" class="p-3 text-slate-500 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </nav>

    <script>
        // --- CONFIG & INIT ---
        const firebaseConfig = { databaseURL: "https://myshyla-3af28-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let statusTerakhir = "";
        let logData = [];
        let oledState = true;
        let lastUpdateTimestamp = Date.now();

        // --- GEBRAKAN: MONITOR STATUS HEARTBEAT ---
        database.ref('status/heartbeat').on('value', () => {
            lastUpdateTimestamp = Date.now();
        });

        setInterval(() => {
            const badge = document.getElementById('wifi-badge');
            if (Date.now() - lastUpdateTimestamp > 8000) {
                badge.innerText = "OFFLINE";
                badge.className = "px-3 py-1 bg-red-500/10 text-red-400 text-[10px] font-bold rounded-full";
            }
        }, 3000);

        database.ref('status/wifi').on('value', (snapshot) => {
            const rssi = snapshot.val();
            const badge = document.getElementById('wifi-badge');
            if (rssi && (Date.now() - lastUpdateTimestamp <= 8000)) {
                badge.innerText = "ONLINE (" + rssi + " dBm)";
                badge.className = "px-3 py-1 bg-green-500/10 text-green-400 text-[10px] font-bold rounded-full";
            }
        });

        // --- NAVIGATION ---
        function switchTab(tabId) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden-tab'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('text-slate-500');
            });

            document.getElementById('content-' + tabId).classList.remove('hidden-tab');
            document.getElementById('nav-' + tabId).classList.add('nav-active');
            document.getElementById('nav-' + tabId).classList.remove('text-slate-500');

            const titles = { dashboard: 'Bento', history: 'History', device: 'Device' };
            const subs = { dashboard: 'Health Monitor', history: 'Event Logs', device: 'Hardware Info' };
            document.getElementById('tab-title').innerText = titles[tabId];
            document.getElementById('header-subtitle').innerText = subs[tabId];
        }

        // --- CHART ---
        const ctx = document.getElementById('mobileChart').getContext('2d');
        const mobileChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(""),
                datasets: [{
                    data: [],
                    borderColor: '#38bdf8',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: (context) => {
                        const g = context.chart.ctx.createLinearGradient(0, 0, 0, 150);
                        g.addColorStop(0, 'rgba(56, 189, 248, 0.2)');
                        g.addColorStop(1, 'rgba(56, 189, 248, 0)');
                        return g;
                    }
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { display: false } },
                animation: { duration: 0 }
            }
        });

        // --- MONITORING LOGIC ---
        database.ref('monitoring').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const gsr = data.gsr;
            const suhu = parseFloat(data.suhu).toFixed(1);
            let currentStatus = "";

            document.getElementById('tempMobile').innerHTML = `${suhu}°`;
            document.getElementById('gsrRawText').innerText = `GSR: ${gsr}`;

            const sTitle = document.getElementById('stressMobile');
            const iTitle = document.getElementById('insightTitle');
            const iDesc = document.getElementById('insightDesc');
            const iEmoji = document.getElementById('insightEmoji');
            const iCard = document.getElementById('insightCard');

            if (gsr > 696) {
                currentStatus = "Lepas";
                sTitle.innerText = "No Signal";
                sTitle.className = "text-xl font-black uppercase text-slate-600";
                iTitle.innerText = "Sensor Lepas";
                iDesc.innerText = "Tempelkan jari pada elektroda.";
                iEmoji.innerText = "🔎";
                iCard.className = "col-span-6 bento-card p-5 flex items-center gap-5 border-l-8 border-slate-700";
            } else if (gsr >= 500) {
                currentStatus = "Normal";
                sTitle.innerText = "Steady";
                sTitle.className = "text-xl font-black uppercase text-emerald-400";
                iTitle.innerText = "Kondisi Stabil";
                iDesc.innerText = "Tubuh dalam keadaan rileks.";
                iEmoji.innerText = "🌿";
                iCard.className = "col-span-6 bento-card p-5 flex items-center gap-5 border-l-8 border-emerald-500";
            } else {
                currentStatus = "Stress";
                sTitle.innerText = "Stressed";
                sTitle.className = "text-xl font-black uppercase text-red-500";
                iTitle.innerText = "Tingkat Stress Tinggi";
                iDesc.innerText = "Coba tarik nafas dalam-dalam.";
                iEmoji.innerText = "⚠️";
                iCard.className = "col-span-6 bento-card p-5 flex items-center gap-5 border-l-8 border-red-500";
            }

            if (currentStatus !== "Lepas" && currentStatus !== statusTerakhir) {
                addLog(currentStatus, gsr, suhu);
                statusTerakhir = currentStatus;
            }

            mobileChart.data.datasets[0].data.push(gsr);
            if (mobileChart.data.datasets[0].data.length > 20) mobileChart.data.datasets[0].data.shift();
            mobileChart.update('none');
        });

        function addLog(status, gsr, suhu) {
            const container = document.getElementById('logContainer');
            if (container.innerText.includes("Belum ada aktivitas")) container.innerHTML = "";
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const color = status === "Normal" ? "text-emerald-400" : "text-red-500";

            logData.push({ waktu: time, status: status, gsr: gsr, suhu: suhu });

            const html = `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <div class="text-left">
                        <p class="text-[9px] text-slate-500">${time}</p>
                        <p class="text-[11px] font-bold ${color}">${status.toUpperCase()}</p>
                    </div>
                    <p class="text-[10px] font-mono text-slate-400 italic">#${gsr} | ${suhu}°C</p>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
        }

        // --- CONTROLS ---
        function toggleOled() {
            oledState = !oledState;
            const btn = document.getElementById('btnOled');
            const dot = btn.querySelector('div');

            if (oledState) {
                btn.className = "w-12 h-6 bg-sky-500 rounded-full relative transition-all";
                dot.style.transform = "translateX(24px)";
                database.ref('control').update({ oled: 1 });
            } else {
                btn.className = "w-12 h-6 bg-slate-700 rounded-full relative transition-all";
                dot.style.transform = "translateX(0px)";
                database.ref('control').update({ oled: 0 });
            }
        }

        function startCalibration() {
            const btn = document.getElementById('btnCalibrate');
            btn.innerText = "WAIT...";
            btn.disabled = true;
            database.ref('control/calibrate').set(1);
            setTimeout(() => {
                database.ref('control/calibrate').set(0);
                btn.innerText = "START";
                btn.disabled = false;
                alert("Kalibrasi Selesai!");
            }, 5000);
        }

        function exportToCSV() {
            if (logData.length === 0) return alert("Data kosong!");
            let csv = "Waktu,Status,GSR,Suhu\n";
            logData.forEach(r => csv += `${r.waktu},${r.status},${r.gsr},${r.suhu}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'biopulse_report.csv');
            a.click();
        }
    </script>
</body>
</html>
