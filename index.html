<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioPulse - Clinical Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-dark: #0f172a;
        --card-dark: #1e293b;
        --neon-blue: #38bdf8;
        --neon-green: #4ade80;
        --neon-red: #fb7185;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: #f1f5f9;
        min-height: 100vh;
        background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
    }

    .neo-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .stat-value {
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }

    .nav-glass {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Animasi Bar Suhu */
    #tempBar {
        box-shadow: 0 0 10px var(--neon-blue);
        transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Custom Scrollbar untuk Log */
    #logContainer::-webkit-scrollbar {
        width: 4px;
    }
    #logContainer::-webkit-scrollbar-thumb {
        background: var(--neon-blue);
        border-radius: 10px;
    }
</style>
</head>
<body class="pb-28">

  <header class="p-8 flex justify-between items-center">
    <div>
        <h1 class="text-2xl font-800 tracking-tighter text-white">BIO<span class="text-sky-400">PULSE</span></h1>
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
            <p class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-500">System Live</p>
        </div>
    </div>
    <div class="p-2 neo-card">
        <svg xmlns="http://www.w3.org/2000/svg" class="text-sky-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
</header>

<main class="px-6 space-y-6">
    <div id="page-dashboard" class="space-y-6">
        <section class="neo-card p-8 flex justify-between items-end relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-sky-400/50 text-[10px] font-bold uppercase tracking-widest mb-1">Body Temperature</p>
                <div class="flex items-baseline gap-1">
                    <span id="tempMobile" class="text-7xl font-black tracking-tighter stat-value">--</span>
                    <span class="text-xl font-bold text-slate-500">°C</span>
                </div>
            </div>
            <div class="w-12 h-24 bg-slate-900/50 rounded-2xl p-1 border border-white/5 relative">
                <div id="tempBar" class="absolute bottom-1 left-1 right-1 bg-gradient-to-t from-sky-600 to-sky-400 rounded-xl" style="height: 0%"></div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <section class="neo-card p-5 border-l-4 border-l-sky-400">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-2">Condition</p>
                <h3 id="stressMobile" class="text-lg font-bold text-white leading-tight">Analyzing...</h3>
                <span id="statusTag" class="text-[9px] font-black text-sky-400 uppercase mt-1 inline-block">Standby</span>
            </section>
            
            <section class="neo-card p-5">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-2">Conductance</p>
                <div id="gsrRawText" class="text-2xl font-mono font-bold text-white">--</div>
                <div class="w-full h-1 bg-slate-800 mt-2 rounded-full overflow-hidden">
                    <div id="gsrProgress" class="h-full bg-sky-400 transition-all duration-500" style="width: 50%"></div>
                </div>
            </section>
        </div>

        <section class="neo-card p-6">
            <h3 class="text-slate-500 font-bold text-[10px] uppercase tracking-widest mb-4 text-center">Neural Signal Stream</h3>
            <canvas id="mobileChart" height="150"></canvas>
        </section>
    </div>

    <div id="page-history" class="hidden space-y-6">
        <h3 class="text-xl font-black px-2">ACTIVITY LOG</h3>
        <div id="logContainer" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
            </div>
    </div>
</main>


<nav class="fixed bottom-0 left-0 right-0 h-24 nav-glass flex items-center justify-around px-10 z-50">
    <button id="btn-home" class="flex flex-col items-center gap-1 text-sky-400">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="text-[8px] font-bold uppercase tracking-tighter">Dash</span>
    </button>
    
    <button id="btn-history" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
        <span class="text-[8px] font-bold uppercase tracking-tighter">Stats</span>
    </button>

    <button onclick="location.reload()" class="w-12 h-12 rounded-full bg-sky-500/10 flex items-center justify-center text-sky-400 border border-sky-400/20 active:rotate-180 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
</nav>

    <script>
        // Logika Navigasi
const btnHome = document.getElementById('btn-home');
const btnHistory = document.getElementById('btn-history');
const pageDashboard = document.getElementById('page-dashboard');
const pageHistory = document.getElementById('page-history');

btnHome.addEventListener('click', () => {
    // Tampilkan Dashboard
    pageDashboard.classList.remove('hidden');
    pageHistory.classList.add('hidden');
    // Ubah Warna Icon
    btnHome.classList.add('text-blue-600');
    btnHome.classList.remove('text-slate-300');
    btnHistory.classList.add('text-slate-300');
    btnHistory.classList.remove('text-blue-600');
});

btnHistory.addEventListener('click', () => {
    // Tampilkan History
    pageDashboard.classList.add('hidden');
    pageHistory.classList.remove('hidden');
    // Ubah Warna Icon
    btnHistory.classList.add('text-blue-600');
    btnHistory.classList.remove('text-slate-300');
    btnHome.classList.add('text-slate-300');
    btnHome.classList.remove('text-blue-600');
});

// Modifikasi fungsi addLog agar menyimpan lebih banyak (misal 10 data)
function addLog(status, gsr) {
    const container = document.getElementById('logContainer');
    
    // 1. Cari elemen pesan "Belum ada riwayat" secara spesifik
    const emptyMessage = container.querySelector('p.italic');
    if (emptyMessage) {
        container.innerHTML = ""; // Hapus pesan tersebut jika ditemukan
    }
    
    const time = new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
    
    // Tentukan warna titik berdasarkan status
    let dotColor = "bg-slate-300"; // Default
    if (status === "Normal") dotColor = "bg-emerald-500 shadow-emerald-200";
    if (status === "Stress") dotColor = "bg-red-500 shadow-red-200";

    const html = `
        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm transform transition-all duration-300 hover:scale-[1.02]">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 rounded-full ${dotColor} shadow-[0_0_8px_rgba(0,0,0,0.1)]"></div>
                <div>
                    <p class="text-sm font-bold text-slate-800">${status}</p>
                    <p class="text-[10px] text-slate-400 font-medium tracking-wide">GSR: ${gsr}</p>
                </div>
            </div>
            <p class="text-[11px] font-mono text-slate-500 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">${time}</p>
        </div>
    `;

    // Tambahkan log baru di paling atas
    container.insertAdjacentHTML('afterbegin', html);

    // Batasi histori agar tidak terlalu panjang (misal 15 data)
    if (container.children.length > 15) {
        container.lastElementChild.remove();
    }
}
        const firebaseConfig = { databaseURL: "https://myshyla-3af28-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let statusTerakhir = "";

        const ctx = document.getElementById('mobileChart').getContext('2d');
        const mobileChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: '#2563eb',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { display: false }, ticks: { display: false } }
                }
            }
        });

        const monitoringRef = database.ref('monitoring');
        monitoringRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const gsr = data.gsr;
                const suhu = parseFloat(data.suhu).toFixed(1);
                let currentStatus = "";

                document.getElementById('tempMobile').innerHTML = `${suhu}°<span class="text-2xl text-slate-300">C</span>`;
                document.getElementById('gsrRawText').innerText = gsr;
                
                // Update Temp Bar
                const barHeight = Math.min((suhu / 40) * 100, 100);
                document.getElementById('tempBar').style.height = barHeight + '%';

                const sTitle = document.getElementById('stressMobile');
                const sTag = document.getElementById('statusTag');

                if (gsr > 696) {
                    currentStatus = "Jari Lepas";
                    sTitle.innerText = "No Signal";
                    sTag.className = "status-badge bg-slate-100 text-slate-500";
                    sTag.innerText = "Disconnected";
                } else if (gsr > 450 && gsr < 696) {
                    currentStatus = "Normal";
                    sTitle.innerText = "Optimal";
                    sTag.className = "status-badge bg-emerald-100 text-emerald-600";
                    sTag.innerText = "Stable";
                } else if (gsr < 450) {
                    currentStatus = "Stress";
                    sTitle.innerText = "High Stress";
                    sTag.className = "status-badge bg-red-100 text-red-600";
                    sTag.innerText = "Warning";
                }

                if (currentStatus !== "" && currentStatus !== statusTerakhir) {
                    addLog(currentStatus, gsr);
                    statusTerakhir = currentStatus;
                }
                updateChart(gsr);
            }
        });

        function updateChart(val) {
            mobileChart.data.labels.push("");
            mobileChart.data.datasets[0].data.push(val);
            if (mobileChart.data.labels.length > 20) {
                mobileChart.data.labels.shift();
                mobileChart.data.datasets[0].data.shift();
            }
            mobileChart.update('none');
        }

        function addLog(status, gsr) {
            const container = document.getElementById('logContainer');
            if (container.innerText.includes("Menunggu data")) container.innerHTML = "";
            const time = new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit' });
            const dotColor = status === "Normal" ? "bg-emerald-500" : (status === "Stress" ? "bg-red-500" : "bg-slate-300");
            
            const html = `
                <div class="bg-white p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${dotColor}"></div>
                        <p class="text-xs font-bold text-slate-700">${status}</p>
                    </div>
                    <p class="text-[10px] text-slate-400">${time}</p>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
            if (container.children.length > 5) container.lastElementChild.remove();
        }
    </script>
</body>
</html>
