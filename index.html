<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioPulse - Clinical Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        color: #1e293b;
        min-height: 100vh;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
    }
    .status-badge {
        padding: 6px 14px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.025em;
    }
    /* Animasi denyut untuk indikator aktif */
    .pulse-blue {
        animation: pulse-animation 2s infinite;
    }
    @keyframes pulse-animation {
        0% { box-shadow: 0 0 0 0px rgba(37, 99, 235, 0.2); }
        100% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
    }
</style>
</head>
<body class="pb-28">

    <header class="p-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-800 text-slate-900 tracking-tight">Bio<span class="text-blue-600">Pulse</span></h1>
            <p class="text-slate-400 text-[10px] font-semibold uppercase tracking-widest">Clinical Monitoring V1.0</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
    </header>

<main class="px-6 space-y-8 pt-2">
    <div id="page-dashboard" class="space-y-6">
        <div class="grid grid-cols-1 gap-6">
            <section class="glass-card p-8 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Internal Temperature</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="tempMobile" class="text-6xl font-extrabold text-slate-900 tracking-tighter">--</h2>
                        <span class="text-2xl font-bold text-blue-500">°C</span>
                    </div>
                    <div class="mt-4 flex items-center gap-3">
                        <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div id="tempBar" class="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400">NORMAL</span>
                    </div>
                </div>
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-50 rounded-full blur-3xl opacity-50"></div>
            </section>
        </div>

        <section class="grid grid-cols-2 gap-4">
            <div class="glass-card p-6 flex flex-col justify-between min-h-[140px]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">GSR State</p>
                <div>
                    <h3 id="stressMobile" class="text-xl font-800 text-slate-800 mb-2">Ready</h3>
                    <div id="statusTag" class="status-badge bg-slate-100 text-slate-400 inline-block">Standby</div>
                </div>
            </div>
            <div class="glass-card p-6 flex flex-col justify-between min-h-[140px]">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Conductance</p>
                <div>
                    <div class="text-3xl font-black text-blue-600 mb-1" id="gsrRawText">--</div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">μSiemens (Raw)</p>
                </div>
            </div>
        </section>

        <section class="glass-card p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-slate-900 font-800 text-sm uppercase tracking-wider">Live Analysis</h3>
                <div class="w-2 h-2 rounded-full bg-red-500 pulse-blue"></div>
            </div>
            <canvas id="mobileChart" height="160"></canvas>
        </section>
    </div>

    <div id="page-history" class="hidden space-y-6">
        <div class="px-2">
            <h3 class="text-2xl font-black text-slate-900">Activity</h3>
            <p class="text-slate-400 text-xs font-medium">Recent physiological changes</p>
        </div>
        <div id="logContainer" class="space-y-3">
            </div>
    </div>
</main>

<nav class="fixed bottom-6 left-6 right-6 h-20 glass-card flex items-center justify-around px-4 z-50 border border-white/50 shadow-2xl">
    <button id="btn-home" class="p-4 text-blue-600 transition-all duration-300 transform active:scale-90">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
    </button>
    
    <button id="btn-history" class="p-4 text-slate-300 transition-all duration-300 transform active:scale-90">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"></path></svg>
    </button>

    <div class="w-[1px] h-8 bg-slate-200"></div>

    <button class="p-4 text-slate-300 active:rotate-180 transition-all duration-500" onclick="location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
    </button>
</nav>

    <script>
        // Logika Navigasi
const btnHome = document.getElementById('btn-home');
const btnHistory = document.getElementById('btn-history');
const pageDashboard = document.getElementById('page-dashboard');
const pageHistory = document.getElementById('page-history');

btnHome.addEventListener('click', () => {
    // Tampilkan Dashboard
    pageDashboard.classList.remove('hidden');
    pageHistory.classList.add('hidden');
    // Ubah Warna Icon
    btnHome.classList.add('text-blue-600');
    btnHome.classList.remove('text-slate-300');
    btnHistory.classList.add('text-slate-300');
    btnHistory.classList.remove('text-blue-600');
});

btnHistory.addEventListener('click', () => {
    // Tampilkan History
    pageDashboard.classList.add('hidden');
    pageHistory.classList.remove('hidden');
    // Ubah Warna Icon
    btnHistory.classList.add('text-blue-600');
    btnHistory.classList.remove('text-slate-300');
    btnHome.classList.add('text-slate-300');
    btnHome.classList.remove('text-blue-600');
});

// Modifikasi fungsi addLog agar menyimpan lebih banyak (misal 10 data)
function addLog(status, gsr) {
    const container = document.getElementById('logContainer');
    
    // 1. Cari elemen pesan "Belum ada riwayat" secara spesifik
    const emptyMessage = container.querySelector('p.italic');
    if (emptyMessage) {
        container.innerHTML = ""; // Hapus pesan tersebut jika ditemukan
    }
    
    const time = new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
    
    // Tentukan warna titik berdasarkan status
    let dotColor = "bg-slate-300"; // Default
    if (status === "Normal") dotColor = "bg-emerald-500 shadow-emerald-200";
    if (status === "Stress") dotColor = "bg-red-500 shadow-red-200";

    const html = `
        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm transform transition-all duration-300 hover:scale-[1.02]">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 rounded-full ${dotColor} shadow-[0_0_8px_rgba(0,0,0,0.1)]"></div>
                <div>
                    <p class="text-sm font-bold text-slate-800">${status}</p>
                    <p class="text-[10px] text-slate-400 font-medium tracking-wide">GSR: ${gsr}</p>
                </div>
            </div>
            <p class="text-[11px] font-mono text-slate-500 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">${time}</p>
        </div>
    `;

    // Tambahkan log baru di paling atas
    container.insertAdjacentHTML('afterbegin', html);

    // Batasi histori agar tidak terlalu panjang (misal 15 data)
    if (container.children.length > 15) {
        container.lastElementChild.remove();
    }
}
        const firebaseConfig = { databaseURL: "https://myshyla-3af28-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let statusTerakhir = "";

        const ctx = document.getElementById('mobileChart').getContext('2d');
        const mobileChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: '#2563eb',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { display: false }, ticks: { display: false } }
                }
            }
        });

        const monitoringRef = database.ref('monitoring');
        monitoringRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const gsr = data.gsr;
                const suhu = parseFloat(data.suhu).toFixed(1);
                let currentStatus = "";

                document.getElementById('tempMobile').innerHTML = `${suhu}°<span class="text-2xl text-slate-300">C</span>`;
                document.getElementById('gsrRawText').innerText = gsr;
                
                // Update Temp Bar
                const barHeight = Math.min((suhu / 40) * 100, 100);
                document.getElementById('tempBar').style.height = barHeight + '%';

                const sTitle = document.getElementById('stressMobile');
                const sTag = document.getElementById('statusTag');

                if (gsr > 696) {
                    currentStatus = "Jari Lepas";
                    sTitle.innerText = "No Signal";
                    sTag.className = "status-badge bg-slate-100 text-slate-500";
                    sTag.innerText = "Disconnected";
                } else if (gsr > 450 && gsr < 696) {
                    currentStatus = "Normal";
                    sTitle.innerText = "Optimal";
                    sTag.className = "status-badge bg-emerald-100 text-emerald-600";
                    sTag.innerText = "Stable";
                } else if (gsr < 450) {
                    currentStatus = "Stress";
                    sTitle.innerText = "High Stress";
                    sTag.className = "status-badge bg-red-100 text-red-600";
                    sTag.innerText = "Warning";
                }

                if (currentStatus !== "" && currentStatus !== statusTerakhir) {
                    addLog(currentStatus, gsr);
                    statusTerakhir = currentStatus;
                }
                updateChart(gsr);
            }
        });

        function updateChart(val) {
            mobileChart.data.labels.push("");
            mobileChart.data.datasets[0].data.push(val);
            if (mobileChart.data.labels.length > 20) {
                mobileChart.data.labels.shift();
                mobileChart.data.datasets[0].data.shift();
            }
            mobileChart.update('none');
        }

        function addLog(status, gsr) {
            const container = document.getElementById('logContainer');
            if (container.innerText.includes("Menunggu data")) container.innerHTML = "";
            const time = new Date().toLocaleTimeString('id-ID', { hour12:false, hour:'2-digit', minute:'2-digit' });
            const dotColor = status === "Normal" ? "bg-emerald-500" : (status === "Stress" ? "bg-red-500" : "bg-slate-300");
            
            const html = `
                <div class="bg-white p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${dotColor}"></div>
                        <p class="text-xs font-bold text-slate-700">${status}</p>
                    </div>
                    <p class="text-[10px] text-slate-400">${time}</p>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
            if (container.children.length > 5) container.lastElementChild.remove();
        }
    </script>
</body>
</html>
