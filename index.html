<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioPulse PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#000;
color:#fff;
}
.bento-card{
background:#1c1c1e;
border-radius:28px;
}
.hidden-tab{display:none}
.nav-active{color:#38bdf8}
</style>
</head>

<body class="pb-32">

<header class="p-8 pb-4">
<p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Health Monitor</p>
<h1 class="text-3xl font-extrabold">BioPulse <span class="text-sky-400">Stress</span></h1>
</header>

<main class="px-6 grid grid-cols-6 gap-4">

<div class="col-span-3 bento-card p-6">
<p class="text-xs text-slate-400">Temp</p>
<h2 id="tempMobile" class="text-3xl font-bold">--</h2>
</div>

<div class="col-span-3 bento-card p-6">
<p class="text-xs text-slate-400">Status Alat</p>
<h2 id="stressMobile" class="text-xl font-bold text-slate-500">WAIT</h2>
</div>

<div class="col-span-6 bento-card p-6">
<div class="flex justify-between mb-2">
<p class="text-xs text-slate-400">Realtime GSR</p>
<p id="gsrRawText" class="text-xs text-sky-400">--</p>
</div>
<canvas id="mobileChart"></canvas>
</div>

<div class="col-span-6 bento-card p-6 flex gap-3">
<button onclick="nextSlide()" class="flex-1 bg-sky-500 p-3 rounded-2xl text-xs font-bold">NEXT OLED</button>
<button onclick="startCalibration()" id="btnCalibrate" class="flex-1 bg-purple-500 p-3 rounded-2xl text-xs font-bold">KALIBRASI</button>
</div>

<div class="col-span-6 bento-card p-6">
<p class="text-xs text-slate-400 mb-2">Log Aktivitas</p>
<div id="logContainer"></div>
<button onclick="exportToCSV()" class="mt-4 w-full bg-green-500 p-3 rounded-2xl text-xs font-bold">Download CSV</button>
</div>

</main>

<script>

const firebaseConfig={databaseURL:"https://myshyla-3af28-default-rtdb.firebaseio.com"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let chartData=[];
let labels=[];
let logArr=[];
let lastStatus="";

const ctx=document.getElementById("mobileChart");
const chart=new Chart(ctx,{
type:'line',
data:{labels:labels,datasets:[{data:chartData,borderColor:'#38bdf8',borderWidth:3,pointRadius:0,tension:0.4}]},
options:{plugins:{legend:{display:false}}}
});

db.ref("monitoring").on("value",snap=>{
const d=snap.val();
if(!d)return;

document.getElementById("tempMobile").innerHTML=d.suhu.toFixed(1)+"°";
document.getElementById("gsrRawText").innerHTML="GSR "+d.gsr;

chartData.push(d.gsr);
labels.push("");
if(chartData.length>30){chartData.shift();labels.shift();}
chart.update();

let status="";
if(d.gsr>700)status="JARI LEPAS";
else if(d.gsr>500)status="NORMAL";
else status="STRESS";

if(status!==lastStatus){
addLog(status,d.gsr,d.suhu);
lastStatus=status;
}
});

db.ref("status/alat").on("value",snap=>{
const s=snap.val();
const el=document.getElementById("stressMobile");
if(s==="AKTIF"){
el.innerHTML="MONITORING";
el.className="text-xl font-bold text-sky-400";
}else{
el.innerHTML="IDLE";
el.className="text-xl font-bold text-slate-500";
}
});

db.ref("status/kalibrasi").on("value",snap=>{
if(snap.val()==="SELESAI"){
alert("Kalibrasi selesai 👍");
document.getElementById("btnCalibrate").innerHTML="KALIBRASI";
}
});

function nextSlide(){
db.ref("control/oled_slide").set(1);
}

function startCalibration(){
document.getElementById("btnCalibrate").innerHTML="PROSES...";
db.ref("control/calibrate").set(1);
}

function addLog(st,gsr,suhu){
let t=new Date().toLocaleTimeString();
logArr.push({t,st,gsr,suhu});

let div=document.getElementById("logContainer");
div.innerHTML=
`<div class="bg-white/5 p-3 rounded-xl mb-2">${t} | ${st} | ${gsr}</div>`
+div.innerHTML;
}

function exportToCSV(){
let csv="Waktu,Status,GSR,Suhu\n";
logArr.forEach(r=>{
csv+=`${r.t},${r.st},${r.gsr},${r.suhu}\n`;
});
let a=document.createElement("a");
a.href="data:text/csv;charset=utf-8,"+encodeURI(csv);
a.download="biopulse_log.csv";
a.click();
}

</script>

</body>
</html>
